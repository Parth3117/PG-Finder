<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PG Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body>
    <!-- Header & Navigation -->
    <header>
        <nav class="navbar">
            <div class="logo">🏠 PG Finder</div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/search">Search PGs</a></li>
            </ul>
            <div id="auth-placeholder"></div>
        </nav>
    </header>

    <!-- Login Form -->
    <section class="listings">
        <div class="form-container">
            <h1 style="text-align: center; margin-bottom: 2rem;">Login to PG Finder</h1>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem;">
                Don't have an account? <a href="/signup">Sign up here</a>
            </p>
            
            <p style="text-align: center; color: var(--text-secondary); margin-top: 1rem;">
                <strong>Test Credentials:</strong><br>
                Email: tenant1@gmail.com<br>
                Password: password123
            </p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/search">Search PGs</a></li>
                </ul>
            </div>
        </div>
        
        <div class="footer-bottom">
            <p>&copy; 2024 PG Finder. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
