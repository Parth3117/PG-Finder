<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Detail - PG Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <style>
        .pg-detail {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .pg-images {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .main-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 0.5rem;
            box-shadow: var(--shadow-lg);
        }
        
        .thumbnail-images {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }
        
        .thumbnail {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 0.375rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.3s ease;
        }
        
        .thumbnail:hover {
            border-color: var(--primary-color);
        }
        
        .pg-details-info {
            background: #f9fafb;
            padding: 2rem;
            border-radius: 0.5rem;
        }
        
        .pg-details-info h1 {
            margin-bottom: 0.5rem;
        }
        
        .btn-icon {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            padding: 0;
        }
        
        .price-section, .description-section, .amenities-section, .rules-section, .contact-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .price-section:last-child {
            border-bottom: none;
        }
        
        .price-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        
        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: white;
            border-radius: 0.375rem;
        }
        
        .price-item .label {
            font-weight: 600;
        }
        
        .price-item .price {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.25rem;
        }
        
        .amenity-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        
        .amenity-badge {
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }
        
        .rules-list {
            list-style: none;
            padding-left: 0;
        }
        
        .rules-list li {
            padding: 0.5rem 0;
            color: var(--text-secondary);
        }
        
        .reviews-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-color);
        }
        
        .review-item {
            background: #f9fafb;
            padding: 1.5rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        .review-form {
            background: #f9fafb;
            padding: 2rem;
            border-radius: 0.5rem;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .pg-detail {
                grid-template-columns: 1fr;
            }
            
            .main-image {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Header & Navigation -->
    <header>
        <nav class="navbar">
            <div class="logo">🏠 PG Finder</div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/search">Search PGs</a></li>
            </ul>
            <div id="auth-placeholder"></div>
        </nav>
    </header>

    <!-- Breadcrumb -->
    <div class="container" style="padding: 2rem 2rem 0;">
        <div class="breadcrumb">
            <a href="/">Home</a>
            <span>/</span>
            <a href="/search">Search</a>
            <span>/</span>
            <span>PG Detail</span>
        </div>
    </div>

    <!-- PG Detail Content -->
    <section class="listings">
        <div class="container">
            <div id="pg-detail-container">
                <div class="loading"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/search">Search PGs</a></li>
                </ul>
            </div>
            
            <div class="footer-section">
                <h4>Contact</h4>
                <ul>
                    <li><a href="mailto:support@pgfinder.com">Email: support@pgfinder.com</a></li>
                </ul>
            </div>
        </div>
        
        <div class="footer-bottom">
            <p>&copy; 2024 PG Finder. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Extract PG ID from URL
        const pgId = window.location.pathname.split('/')[2];
        document.body.dataset.pgId = pgId;
    </script>
    
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
