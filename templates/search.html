<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search PGs - PG Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="nav-brand">🏠 PGFinder</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/search" class="nav-link active">Search PGs</a>
                <div id="authNav">
                    <a href="/login" class="nav-link">Login</a>
                    <a href="/signup" class="nav-link btn-primary">Sign Up</a>
                </div>
                <div id="loggedInNav" style="display:none;">
                    <a href="/dashboard" class="nav-link">Dashboard</a>
                    <button onclick="logout()" class="nav-link btn-danger">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="search-page">
            <!-- Filters Sidebar -->
            <aside class="filters">
                <h3>Filters</h3>
                
                <div class="filter-group">
                    <label>City</label>
                    <input type="text" id="filterCity" placeholder="Enter city" class="filter-input">
                </div>

                <div class="filter-group">
                    <label>Area</label>
                    <input type="text" id="filterArea" placeholder="Enter area" class="filter-input">
                </div>

                <div class="filter-group">
                    <label>Budget Range</label>
                    <select id="filterBudget" class="filter-input">
                        <option value="">All</option>
                        <option value="0-5000">₹0 - ₹5,000</option>
                        <option value="5000-10000">₹5,000 - ₹10,000</option>
                        <option value="10000-15000">₹10,000 - ₹15,000</option>
                        <option value="15000-20000">₹15,000 - ₹20,000</option>
                        <option value="20000+">₹20,000+</option>
                    </select>
                </div>

                <button onclick="applyFilters()" class="btn-primary">Apply Filters</button>
            </aside>

            <!-- PG Listings -->
            <main class="listings">
                <h2>PG Listings</h2>
                <div id="pgListings" class="pgs-grid">
                    <!-- PG listings will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <div id="pagination" class="pagination">
                    <!-- Pagination buttons will be added here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 PGFinder. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        let currentPage = 1;
        let currentFilters = {};

        function applyFilters() {
            currentFilters = {
                city: document.getElementById('filterCity').value,
                area: document.getElementById('filterArea').value,
                budget: document.getElementById('filterBudget').value
            };
            currentPage = 1;
            loadPGs();
        }

        async function loadPGs() {
            try {
                const params = new URLSearchParams();
                if (currentFilters.city) params.append('city', currentFilters.city);
                if (currentFilters.area) params.append('area', currentFilters.area);
                params.append('page', currentPage);
                params.append('limit', 12);

                const response = await fetch(`/api/pgs?${params}`);
                const data = await response.json();

                if (data.success) {
                    displayPGs(data.data);
                    displayPagination(data.pagination);
                }
            } catch (error) {
                console.error('Error loading PGs:', error);
            }
        }

        function displayPGs(pgs) {
            const container = document.getElementById('pgListings');
            container.innerHTML = pgs.map(pg => `
                <div class="pg-card">
                    <div class="pg-image">
                        <img src="${pg.images[0] || 'https://via.placeholder.com/300x200'}" alt="${pg.title}">
                        ${pg.rating >= 4.5 ? `<span class="rating-badge">⭐ ${pg.rating}</span>` : ''}
                    </div>
                    <div class="pg-info">
                        <h3>${pg.title}</h3>
                        <p class="location">📍 ${pg.area}, ${pg.city}</p>
                        <p class="price">From ₹${Math.min(...Object.values(pg.price_per_room)).toLocaleString()}/month</p>
                        <div class="amenities-preview">
                            ${pg.amenities.slice(0, 3).map(a => `<span class="amenity-tag">${a}</span>`).join('')}
                        </div>
                        <div class="pg-footer">
                            <span class="reviews">★ ${pg.rating} (${pg.review_count} reviews)</span>
                            <a href="/pg/${pg.id}" class="btn-secondary">View Details</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayPagination(pagination) {
            const container = document.getElementById('pagination');
            if (pagination.total_pages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= pagination.total_pages; i++) {
                html += `<button onclick="changePage(${i})" class="page-btn ${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            loadPGs();
            window.scrollTo(0, 0);
        }

        // Load PGs on page load
        window.addEventListener('load', loadPGs);
    </script>
</body>
</html>
