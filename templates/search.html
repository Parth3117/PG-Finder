<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search PGs - PG Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body>
    <!-- Header & Navigation -->
    <header>
        <nav class="navbar">
            <div class="logo">🏠 PG Finder</div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/search">Search PGs</a></li>
                <li><a href="/#features">Features</a></li>
            </ul>
            <div id="auth-placeholder"></div>
        </nav>
    </header>

    <!-- Search Section -->
    <section class="listings" style="padding-top: 2rem;">
        <div class="container">
            <h1 style="margin-bottom: 2rem;">Find Your Perfect PG</h1>
            
            <!-- Search Filters -->
            <form id="search-form" style="background: #f9fafb; padding: 2rem; border-radius: 0.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" placeholder="e.g., Delhi, Bangalore">
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="area">Area</label>
                    <input type="text" id="area" name="area" placeholder="e.g., Hauz Khas">
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="min_price">Min Price</label>
                    <input type="number" id="min_price" name="min_price" placeholder="Minimum">
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="max_price">Max Price</label>
                    <input type="number" id="max_price" name="max_price" placeholder="Maximum">
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="room_type">Room Type</label>
                    <select id="room_type" name="room_type">
                        <option value="">All Types</option>
                        <option value="single">Single</option>
                        <option value="double">Double Sharing</option>
                        <option value="triple">Triple Sharing</option>
                    </select>
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="amenities">Amenities</label>
                    <input type="text" id="amenities" name="amenities" placeholder="e.g., WiFi, AC">
                </div>
                
                <button type="submit" class="btn btn-primary" style="grid-column: 1 / -1; margin-top: 1rem;">Search</button>
            </form>
            
            <!-- Listings Grid -->
            <div id="listings-grid" class="listings-grid">
                <!-- Listings will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/search">Search PGs</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </div>
            
            <div class="footer-section">
                <h4>For Tenants</h4>
                <ul>
                    <li><a href="/search">Search PGs</a></li>
                    <li><a href="/login">Login</a></li>
                    <li><a href="/signup">Sign Up</a></li>
                </ul>
            </div>
            
            <div class="footer-section">
                <h4>Contact</h4>
                <ul>
                    <li><a href="mailto:support@pgfinder.com">Email: support@pgfinder.com</a></li>
                    <li>Phone: +91-9876543210</li>
                </ul>
            </div>
        </div>
        
        <div class="footer-bottom">
            <p>&copy; 2024 PG Finder. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
